<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">🧾 Finalizar compra</h2>

    <div class="row">
        <!-- FORMULARIO -->
        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h4>Datos del cliente</h4>

                <input id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input id="direccion" class="form-control mb-2" placeholder="Dirección">
                <input id="telefono" class="form-control mb-2" placeholder="Teléfono">

                <select id="pago" class="form-control mb-3">
                    <option value="">Método de pago</option>
                    <option>Efectivo</option>
                    <option>Tarjeta</option>
                    <option>Yape / Plin</option>
                </select>

                <button class="btn btn-success w-100" onclick="finalizarCompra()">
                    Confirmar compra
                </button>
            </div>
        </div>

        <!-- RESUMEN -->
        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h4>Resumen</h4>

                <div id="resumen"></div>

                <h5 class="mt-3" id="total"></h5>
            </div>
        </div>
    </div>
</div>

<script src="../JS/carrito.js"></script>
<script src="../JS/checkout.js"></script>

</body>
</html>
