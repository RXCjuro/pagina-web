<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toñita | login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <main class="contenedor">
        <section class="tarjeta">
            <h1>Toñita</h1>
            <p class="subtitulo">Iniciar sesion para ingresar</p>
            
            <form action="formLogin">
                <div class="grupo-formulario">
                    <label for="correoLogin">Correo electronico</label>
                    <input type="email" id="correoLogin" placeholder="ejemplo@gmail.com">
                </div>

                <div class="grupo-formulario">
                    <label for="claveLogin">Contraseña</label>
                    <input type="password" id="claveLogin" placeholder="Ingresa tu Contraseña">
                </div>

                <button type="submit" class="btn-principal">
                    Iniciar sesion
                </button>
            </form>

            <p id="mensajeLogin" class="mensaje"></p>
            <p class="texto-enlace">¿No tienes cuenta?<a href="registro.html">Registrate aquí</a></p>
        </section>
    </main>

    <script src="../JS/login.js"></script>
</body>

</html>
